openapi: 3.0.0
info:
  title: Enterprise Authentication Service API
  version: 1.0.0
  description: API documentation for AuthSphere authentication and authorization platform.
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /auth/login:
    post:
      summary: User Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
  /auth/register:
    post:
      summary: User Registration
      responses:
        '201':
          description: User registered successfully
  /users:
    get:
      summary: List Users
      responses:
        '200':
          description: A list of users
